{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm rounded-3 text-center p-4">

                <!-- Icon & Title -->
                <i class="fas fa-shield-alt fa-3x text-primary mb-3"></i>
                <h3 class="mb-3">Confirm Sign In</h3>
                <p class="text-muted mb-4">
                    You are about to sign in using your 
                    <strong class="text-primary">{{ provider.name }}</strong> account.
                </p>

                <!-- Confirm Form -->
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-check me-2"></i>Continue with {{ provider.name }}
                    </button>
                </form>

                <!-- Cancel Button -->
                <a href="{% url 'account_login' %}" class="btn btn-outline-secondary w-100">
                    <i class="fas fa-times me-2"></i>Cancel
                </a>

            </div>
        </div>
    </div>
</div>
{% endblock %}
